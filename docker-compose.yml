version: "3.9"

services:

  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"

  user-service:
    build: ./services/user-service
    ports:
      - "5002:5002"

  gateway:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - user-service